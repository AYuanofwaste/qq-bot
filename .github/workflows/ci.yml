name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt1-dev ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          find . -name '*.py' -not -path './.git/*' -exec python -m py_compile {} +

      - name: Check import (core)
        run: |
          python -c "
import sys
sys.path.insert(0, '.')
try:
    from core.helpers import *
    print('core.helpers OK')
except Exception:
    print('core.helpers SKIP (needs env)')
try:
    import mcp_client.client
    print('mcp_client.client OK')
except Exception as e:
    print(f'mcp_client.client SKIP: {e}')
try:
    import news.domestic
    print('news.domestic OK')
except Exception as e:
    print(f'news.domestic SKIP: {e}')
try:
    import news.global_
    print('news.global_ OK')
except Exception as e:
    print(f'news.global_ SKIP: {e}')
"
